  <path d="M36 42 Q41 40 46 42" stroke="#1c1917" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M54 42 Q59 40 64 42" stroke="#1c1917" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Thin smile -->
