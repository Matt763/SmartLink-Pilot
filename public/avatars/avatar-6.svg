  <ellipse cx="41" cy="47" rx="4" ry="3.5" fill="#f8fafc"/>
  <ellipse cx="59" cy="47" rx="4" ry="3.5" fill="#f8fafc"/>
  <ellipse cx="41" cy="47" rx="2.5" ry="2.5" fill="#1e293b"/>
